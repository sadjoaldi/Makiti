events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Redirige tout le HTTP vers HTTPS
  server {
    listen 80;
    server_name makiti.xxx www.makiti.xxx;

    # Pour le renouvellement Certbot
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS
  server {
    listen 443 ssl;
    server_name makiti.xxx www.makiti.xxx;

    ssl_certificate /etc/letsencrypt/live/makiti.xxx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/makiti.xxx/privkey.pem;

    # Sécurité SSL de base
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 12M;  # Pour l'upload d'images

    # API → backend
    location /api/ {
      proxy_pass http://backend:3001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tout le reste → frontend
    location / {
      proxy_pass http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}